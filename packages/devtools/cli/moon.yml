layer: application
language: typescript
tags:
  - ts-build
  - ts-test
tasks:
  build:
    command: bun
    options:
      mergeArgs: replace
      mergeInputs: append
      mergeOutputs: replace
      timeout: 60
    inputs:
      - scripts/build.ts
      - bunfig.toml
      - package.json
      - LICENSE
    outputs:
      - dist/cli/
      - dist/cli-darwin-arm64/
      - dist/cli-darwin-x64/
      - dist/cli-linux-arm64/
      - dist/cli-linux-x64/
      - dist/cli-win32-x64/
  dev:
    # Runs the CLI directly from source (no build step) via ./bin/dx.
    command: ./bin/dx
    preset: server
  publish:
    command: bun
    args:
      - ./scripts/publish.ts
    deps:
      - build
    inputs:
      - scripts/publish.ts
      - dist/**/*
