version: 1
runtime:
  client:
    storage:
      persistent: true
      dataStore: 1
    edgeFeatures:
      signaling: true
      echoReplicator: false
      subductionReplicator: true
      feedReplicator: true
      agents: true
    disableP2pReplication: true
    log:
      filter: 'echo-edge-subduction-replicator:debug'
  services:
    # signaling:
    #   - server: wss://kube.dxos.org/.well-known/dx/signal
    ice:
      - urls: turn:kube.dxos.org:3478
        username: dxos
        credential: dxos
    edge:
      url: https://edge-main.dxos.workers.dev/
    iceProviders:
      - urls: https://edge-production.dxos.workers.dev/ice
