#
# Cloudflare Workers (Static Assets) config for testbench — assets-only (no Worker script).
# Deployed by .github/workflows/scripts/deploy-env.mjs via `wrangler deploy --config <this> --env <env>`.
#

name = "testbench"
compatibility_date = "2024-11-01"

[assets]
directory = "./out/testbench"
not_found_handling = "single-page-application"

# Per-env Worker names (production = bare name / custom domain; others suffixed). Inherits [assets].
[env.production]
name = "testbench"

[env.main]
name = "testbench-main"
