layer: application
language: typescript
tags:
  - ts-test
  - typecheck
  - vite
  - storybook
tasks:
  # Ensure the main checkout's gitignored `dist` is a real directory (not a stale symlink) before
  # bundle/serve. Linked worktrees write build output there directly; no-op in the main worktree.
  prepare-dist:
    command: node scripts/prepare-dist.mjs
    # Uncached so a prior worktree's symlink is removed before Vite writes; no-op in CI main checkout.
    options:
      cache: false
  # `build` here is typecheck-only (see .moon/tasks/tag-typecheck.yml); `bundle`/`serve` (tag-vite)
  # are what actually emit `dist`. Hook bundle/serve so the canonical dist dir exists before Vite runs.
  build:
    deps:
      - prepare-dist
  bundle:
    deps:
      - prepare-dist
  serve:
    deps:
      - prepare-dist
