layer: application
language: typescript
tags:
  - ts-test
  - typecheck
  - vite
  - storybook
tasks:
  # Bundle the extension, then mirror `dist/` into the main repo when running
  # from a git worktree so Chrome (pointed at the stable main-repo path for
  # "Load unpacked") picks up the new build without a manual copy.
  #
  # From the main checkout this is a no-op — use `bundle` directly if you
  # prefer to skip the sync step.
  bundle-sync:
    command: pnpm run sync:dist
    deps:
      - bundle
    inputs:
      - dist/**/*
      - scripts/sync-dist.mjs
