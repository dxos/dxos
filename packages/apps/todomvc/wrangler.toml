#
# Cloudflare Workers (Static Assets) config for todomvc — assets-only (no Worker script).
# Deployed by .github/workflows/scripts/deploy-env.mjs via `wrangler deploy --config <this> --env <env>`.
#

name = "todomvc"
compatibility_date = "2024-11-01"

[assets]
directory = "./out/todomvc"
not_found_handling = "single-page-application"

# Per-env Worker names (production = bare name / custom domain; others suffixed). Inherits [assets].
[env.production]
name = "todomvc"

[env.main]
name = "todomvc-main"
