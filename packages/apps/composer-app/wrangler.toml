#
# Cloudflare Workers (Static Assets) configuration.
#
# Migrated from Pages Functions advanced mode: `_worker.js` is the Worker entry (`main`), static assets
# are served via the `ASSETS` binding, and `/api/*` runs the Worker first (feedback-logs, RSS proxy,
# OTel -> SigNoz proxy) while every other route is asset-first with SPA fallback to index.html.
#
# Deployed by .github/workflows/scripts/deploy-env.sh via `wrangler deploy --config <this> --env <env>`.
# `_worker.js` is emitted inside the asset dir (the still-on-Pages preview build also consumes it there),
# so it is kept out of the asset upload with a generated `.assetsignore` (written by deploy-env.sh).
#
# Local dev: `moon run composer-app:bundle && wrangler dev` (uses the default/top-level bindings below).
#

name = "composer"
main = "./out/composer/_worker.js"
compatibility_date = "2024-04-05"

# Default / local-dev bindings (used by `wrangler dev`; per-env deploys use the [env.*] sections). Inline
# form is deliberate — a `[vars]` table header would swallow the following d1/r2 keys into `vars.*`.
vars = { ENVIRONMENT = "dev", SIGNOZ_INGEST_URL = "https://ingest.eu.signoz.cloud" }
d1_databases = [{ binding = "DB", database_name = "dev-users", database_id = "756b796d-02e5-45e7-9067-12144a2124b2" }]
r2_buckets = [{ binding = "FEEDBACK_LOGS", bucket_name = "composer-feedback-logs-dev" }]

[assets]
directory = "./out/composer"
binding = "ASSETS"
# Unmatched routes return index.html (client-side router owns them)...
not_found_handling = "single-page-application"
# ...except /api/*, which must reach the Worker before the SPA fallback swallows it.
run_worker_first = ["/api/*"]

# --- Per-environment Workers ---
# `name` is the deployed Worker (production = the bare name that carries the custom domain; other envs are
# suffixed). Bindings are NOT inherited into [env.*], so each repeats them.
# NOTE (Cloudflare-side): each Worker needs its D1 database + R2 bucket to exist and the
# `SIGNOZ_INGESTION_KEY` secret set (`wrangler secret put --env <env>`). labs + main use the dev
# resources, staging mirrors the old Pages `preview`, production uses prod — confirm against the account.

[env.production]
name = "composer"
vars = { ENVIRONMENT = "production", SIGNOZ_INGEST_URL = "https://ingest.eu.signoz.cloud" }
d1_databases = [{ binding = "DB", database_name = "prod-users", database_id = "f48ca977-f25f-49d2-a203-5fc0cca01f55" }]
r2_buckets = [{ binding = "FEEDBACK_LOGS", bucket_name = "composer-feedback-logs" }]

[env.staging]
name = "composer-staging"
vars = { ENVIRONMENT = "staging", SIGNOZ_INGEST_URL = "https://ingest.eu.signoz.cloud" }
d1_databases = [{ binding = "DB", database_name = "prod-users", database_id = "f48ca977-f25f-49d2-a203-5fc0cca01f55" }]
r2_buckets = [{ binding = "FEEDBACK_LOGS", bucket_name = "composer-feedback-logs-preview" }]

[env.labs]
name = "composer-labs"
vars = { ENVIRONMENT = "labs", SIGNOZ_INGEST_URL = "https://ingest.eu.signoz.cloud" }
d1_databases = [{ binding = "DB", database_name = "dev-users", database_id = "756b796d-02e5-45e7-9067-12144a2124b2" }]
r2_buckets = [{ binding = "FEEDBACK_LOGS", bucket_name = "composer-feedback-logs-dev" }]

[env.main]
name = "composer-main"
vars = { ENVIRONMENT = "main", SIGNOZ_INGEST_URL = "https://ingest.eu.signoz.cloud" }
d1_databases = [{ binding = "DB", database_name = "dev-users", database_id = "756b796d-02e5-45e7-9067-12144a2124b2" }]
r2_buckets = [{ binding = "FEEDBACK_LOGS", bucket_name = "composer-feedback-logs-dev" }]
