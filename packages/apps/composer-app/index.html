<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="DXOS Composer" />
    <!-- NOTE: viewport-fit=cover defines safe-area-inset-top, etc. for iOS. -->
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no,interactive-widget=resizes-content,viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#003E70" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f8f9" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#252529" />

    <title>Composer</title>

    <!-- https://realfavicongenerator.net -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/site.webmanifest" />

    <!--
      Suppress lit's dev-mode warning. Lit checks `globalThis.litIssuedWarnings`
      against either the warning code or the full text and skips emitting if a
      match is already present (`@lit/reactive-element/development/reactive-element.js`).
      This must execute *before* any module loads — ESM `import`s are hoisted
      above non-import statements, so the same suppression in `src/main.tsx`
      fires after lit's `queueMicrotask` warning has already run.
    -->
    <script>
      (window.litIssuedWarnings ??= new Set()).add('dev-mode');
    </script>
  </head>
  <body>
    <!--
      Boot loader (style block, skeleton DOM, and inline driver script) is injected by
      `bootLoaderPlugin` from `@dxos/app-framework/vite-plugin` (see vite.config.ts).
      The host calls `window.__bootLoader.status(text)` from `src/main.tsx` between
      phases and `window.__bootLoader.dismiss()` once React has mounted.
    -->
    <div id="root" class="contents"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
