<!doctype html>
<html lang="en" style="overscroll-behavior: none">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="DXOS Composer" />
    <!-- NOTE: viewport-fit=cover defines safe-area-inset-top, etc. for iOS. -->
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no,interactive-widget=resizes-content,viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#003E70" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f8f9" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#252529" />

    <title>Composer</title>

    <!-- https://realfavicongenerator.net -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/site.webmanifest" />

    <style>
      /*
       * App-specific critical styles (theme colors are injected by ThemePlugin via transformIndexHtml).
       */
      html {
        font-size: 18px;
      }
      @media (min-width: 768px) {
        html {
          font-size: 16px;
        }
      }
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      body {
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root" class="contents"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
