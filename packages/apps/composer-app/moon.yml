layer: application
language: typescript
tags:
  - e2e
  - tauri
  - typecheck
  - vite
  - ts-test
  - storybook
tasks:
  bundle:
    # Emit `_worker.js` after `vite build` so it survives Vite's `emptyOutDir`.
    script: pnpm exec vite build && pnpm run --silent build:functions
    deps:
      - prebuild
  # Native (Tauri) builds embed the web bundle via `frontendDist`; `beforeBuildCommand` is empty, so the
  # frontend + macOS ollama sidecar are hoisted to task deps here (no moon-in-moon). Locally
  # `moon run composer-app:tauri-build` builds them first; CI runs `tauri build` bare — frontend from a
  # prebuilt artifact, sidecar fetched directly — to keep moon out of the native job.
  tauri-build:
    deps:
      - bundle
      - fetch-ollama
  tauri-ios-build:
    deps:
      - bundle
  # Downloads the pinned macOS ollama runtime + triple-named sidecars embedded in the desktop app. Cacheable:
  # keyed on the fetch script (which pins the version + SHA-256), with the downloaded sidecar dir as the
  # output — so a cache hit restores it instead of re-downloading the (large) runtime.
  fetch-ollama:
    command: node scripts/fetch-ollama.mjs
    inputs:
      - scripts/fetch-ollama.mjs
    outputs:
      - src-tauri/sidecar
  prebuild:
    script: pnpm run --silent copy:assets
    deps:
      - ^:prebuild
    inputs:
      - package.json
      - moon.yml
    outputs:
      - public/assets/plugin-sketch
  serve:
    deps:
      - prebuild
  # Minimal-plugin dev server: skips `^:build` — vite dev resolves @dxos/* from
  # source (importSource) — and builds only packages whose dist is consumed.
  # Keep the dep list in sync with the importSource `exclude` list in
  # vite.config.ts. DX_PLUGIN_SET=minimal swaps in plugin-defs.minimal.tsx.
  serve-min:
    command: pnpm exec vite dev
    env:
      DX_PLUGIN_SET: minimal
    preset: server
    deps:
      - prebuild
      # dist consumed at runtime (importSource exclude list).
      - client-services:build
      - config:build
      - lit-grid:build
      - lit-ui:build
      - lock-file:build
      - network-manager:build
      - observability:build
      - protocols:build
      - random-access-storage:build
      - teleport:build
      # No `source` export condition — dist is the only entry.
      - shell:build
      # dist consumed at config-load time (vite.config.ts imports).
      - app-framework:build
      - ui-theme:build
      - util:build
      - vite-plugin-icons:build
      - vite-plugin-import-source:build
      - vite-plugin-log:build
      - vite-plugin-shutdown:build
  # Dev-server startup harness — measures `vite serve` against the shared
  # `dev-startup.spec.ts`. Distinct from `e2e` (which inherits from `ts-test`'s
  # default playwright config and runs the production preview harness).
  e2e-dev:
    command: pnpm exec playwright test --config=src/playwright/playwright-dev.config.ts
    deps:
      - prebuild
      - ^:build
  e2e-welcome-focus:
    command: pnpm exec playwright test --config=src/playwright/playwright-welcome-focus.config.ts
    deps:
      - prebuild
      - ^:build
  test:
    inputs:
      - .storybook/*
      - /tools/storybook-react/.storybook/main.ts
      - vite.config.ts
