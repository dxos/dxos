layer: application
language: typescript
tags:
  - e2e
  - tauri
  - typecheck
  - vite
  - ts-test
  - storybook
tasks:
  bundle:
    # Emit `_worker.js` after `vite build` so it survives Vite's `emptyOutDir`.
    script: pnpm exec vite build && pnpm run --silent build:functions
    deps:
      - prebuild
  compile:
    deps:
      - prebuild
  prebuild:
    script: pnpm run --silent copy:assets
    deps:
      - ^:prebuild
    inputs:
      - package.json
      - moon.yml
    outputs:
      - public/assets/plugin-sketch
  serve:
    deps:
      - prebuild
  # Dev-server startup harness — measures `vite serve` against the shared
  # `dev-startup.spec.ts`. Distinct from `e2e` (which inherits from `ts-test`'s
  # default playwright config and runs the production preview harness).
  e2e-dev:
    command: pnpm exec playwright test --config=src/playwright/playwright-dev.config.ts
    deps:
      - prebuild
      - ^:build
  e2e-welcome-focus:
    command: pnpm exec playwright test --config=src/playwright/playwright-welcome-focus.config.ts
    deps:
      - prebuild
      - ^:build
  test:
    inputs:
      - .storybook/*
      - /tools/storybook-react/.storybook/main.ts
      - vite.config.ts
  # Regenerate the Bramble Coffee Roasters exemplar space snapshot at
  # src/plugins/welcome/content/exemplar-space.dx.json. Developer-on-demand; the
  # snapshot is committed and not part of the default build pipeline.
  build-exemplar:
    script: pnpm run --silent build-exemplar
    env:
      BUILD_EXEMPLAR: '1'
    deps:
      - ^:compile
    inputs:
      - scripts/build-exemplar-space.node.test.ts
      - src/plugins/welcome/content/welcome.md
      - src/plugins/welcome/content/about-bramble.md
    outputs:
      - src/plugins/welcome/content/exemplar-space.dx.json
