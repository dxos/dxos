# NOTE: The `e2e` tag is intentionally absent — composer's e2e suite runs on
# Stagehand + vitest (src/e2e) rather than the shared playwright preset.
layer: application
language: typescript
tags:
  - tauri
  - typecheck
  - vite
  - ts-test
  - storybook
tasks:
  bundle:
    # Emit `_worker.js` after `vite build` so it survives Vite's `emptyOutDir`.
    script: pnpm exec vite build && pnpm run --silent build:functions
    deps:
      - prebuild
  compile:
    deps:
      - prebuild
  prebuild:
    script: pnpm run --silent copy:assets
    deps:
      - ^:prebuild
    inputs:
      - package.json
      - moon.yml
    outputs:
      - public/assets/plugin-sketch
  serve:
    deps:
      - prebuild
  # Production preview e2e suite — Stagehand-driven browser tests run by vitest
  # against `vite preview` (started by the suite's global setup).
  e2e:
    command: pnpm exec vitest run --config=src/e2e/vitest.config.ts
    deps:
      - target: ^:build
        optional: true
      - target: ^:compile
        optional: true
      - target: bundle
        optional: true
    env:
      DX_EDGE_BASE_URL: 'wss://edge-main.dxos.workers.dev/'
      DX_TELEMETRY_TAG: e2e
    inputs:
      - src/e2e/**/*
      - '@group(sources)'
      - '@group(tests)'
      - $CI
      - $CONFIG_DYNAMIC
      - $DX_ENVIRONMENT
      - $DX_HOST
      - $DX_HUB_URL
      - $DX_IPDATA_API_KEY
      - $DX_SHARED_WORKER
      - $STAGEHAND_MODEL
  # Dev-server startup harness — measures `vite serve` against
  # `dev-startup.spec.ts`. Distinct from `e2e` (which runs the production
  # preview harness).
  e2e-dev:
    command: pnpm exec vitest run --config=src/e2e/vitest.dev.config.ts
    deps:
      - prebuild
      - ^:build
  e2e-welcome-focus:
    command: pnpm exec vitest run --config=src/e2e/vitest.welcome-focus.config.ts
    deps:
      - prebuild
      - ^:build
  test:
    inputs:
      - .storybook/*
      - /tools/storybook-react/.storybook/main.ts
      - vite.config.ts
