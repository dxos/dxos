layer: application
language: typescript
tags:
  - e2e
  - tauri
  - typecheck
  - vite
  - ts-test
  - storybook
tasks:
  bundle:
    # Emit `_worker.js` after `vite build` so it survives Vite's `emptyOutDir`.
    script: pnpm exec vite build && pnpm run --silent build:functions
    deps:
      - prebuild
    inputs:
      - src/functions/_worker.ts
    outputs:
      - out/composer/_worker.js
  compile:
    deps:
      - prebuild
  prebuild:
    script: pnpm run --silent copy:assets
    deps:
      - ^:prebuild
    inputs:
      - package.json
      - moon.yml
    outputs:
      - public/assets/plugin-sketch
  serve:
    deps:
      - prebuild
  test:
    inputs:
      - .storybook/*
      - /tools/storybook-react/.storybook/main.ts
      - vite.config.ts
