layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - pack
tasks:
  compile:
    deps:
      - deus:prebuild-lezer
    args:
      - '--entryPoint=src/index.ts'
      - '--entryPoint=src/extension/index.ts'
      - '--platform=neutral'
  prebuild-lezer:
    command: pnpm exec lezer-generator --typeScript ./src/extension/mdl.grammar -o ./src/extension/gen/mdl.ts
    inputs:
      - src/extension/mdl.grammar
    outputs:
      - src/extension/gen/mdl.terms.ts
      - src/extension/gen/mdl.ts
