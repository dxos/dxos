layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - pack
tasks:
  # Use dx-compile (esbuild) for JS: rolldown cannot follow relative CJS requires inside
  # __commonJSMin factories (e.g. varint → ./encode.js, ./decode.js). esbuild properly inlines
  # all transitive CJS requires. DTS is generated by the inherited build task.
  compile:
    command: pnpm exec dx-compile
    args:
      - '--entryPoint=src/index.ts'
      - '--entryPoint=src/testing/index.ts'
      - '--outputPath=dist/lib'
      - '--injectGlobals'
      - '--bundlePackage=varint'
      - '--platform=neutral'
    deps:
      - dx-compile:compile
      - ^:compile
    inputs:
      - 'src/**/*'
    outputs:
      - dist/lib/
    options:
      mergeArgs: replace
      mergeOutputs: replace
      timeout: 30
