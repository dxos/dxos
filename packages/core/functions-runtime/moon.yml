layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - pack
tasks:
  build:
    deps:
      - prebuild

  prebuild:
    command: noop
    deps:
      - build-runtime

  build-runtime:
    command: node ./scripts/build-modules.mjs
    deps:
      - ^:build
      - ^:compile

  # Executed manually: moon functions-runtime:upload-runtime -- --env dev
  upload-runtime:
    command: node scripts/upload-modules.mjs
    deps:
      - build-runtime
