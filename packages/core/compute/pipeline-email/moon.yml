layer: library
language: typescript
tags:
  - ts-build
  - ts-test
tasks:
  # Provision everything the ROOT_DIR-gated tests need: the Enron dataset (setup.sh) and the
  # benchmark models (via the pull-models dep).
  setup:
    command: 'sh scripts/setup.sh'
    deps:
      - '~:pull-models'
    options:
      runInCI: false
      cache: false

  # Pull the non-reasoning Ollama models used by the extraction benchmark.
  pull-models:
    command: 'sh scripts/pull-models.sh'
    options:
      runInCI: false
      cache: false

  compile:
    args:
      - '--entryPoint=src/index.ts'
      - '--platform=neutral'
