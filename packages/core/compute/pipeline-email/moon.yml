layer: library
language: typescript
tags:
  - ts-build
  - ts-test
tasks:
  # Checkout the Enron email dataset into ./data for the ROOT_DIR-gated email-pipeline test.
  setup:
    command: 'sh scripts/setup.sh'
    options:
      runInCI: false
      cache: false

  compile:
    args:
      - '--entryPoint=src/index.ts'
      - '--platform=neutral'
