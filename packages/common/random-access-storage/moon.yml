layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - pack
tasks:
  # Override the inherited tsdown build with dx-compile (esbuild): rolldown cannot follow relative
  # CJS requires inside __commonJSMin factories (e.g. random-access-idb → ./lib/blocks.js).
  # esbuild properly inlines all transitive CJS requires including relative paths.
  build:
    command: pnpm exec dx-compile
    args:
      - '--entryPoint=src/index.ts'
      - '--entryPoint=src/browser/index.ts'
      - '--entryPoint=src/node/index.ts'
      - '--outputPath=dist/lib'
      - '--injectGlobals'
      - '--bundlePackage=random-access-idb'
    deps:
      - dx-compile:compile
      - ^:build
    inputs:
      - 'src/**/*'
    outputs:
      - dist/lib/
    options:
      mergeArgs: replace
      mergeOutputs: replace
      timeout: 30
