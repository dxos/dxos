layer: library
language: typescript
tags:
  - ts-vite-build
  - ts-test
  - ts-test-storybook
  - pack
  - storybook
tasks:
  build:
    deps:
      - prebuild
  prebuild:
    command: bash ./scripts/copy_assets.sh
    toolchains: node # enforce that deps are installed
    inputs:
      - scripts/copy_assets.sh
      - package.json
      - moon.yml
    outputs:
      - dist/assets
