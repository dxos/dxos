layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - pack
tasks:
  generate-fixtures:
    command: 'pnpm exec tsx src/testing/generate-fixtures.ts'
    options:
      runInCI: false
      cache: false

  # List the channels the bot can see. Requires DISCORD_TOKEN; prints `<id>  <#channel — guild>`.
  channels:
    command: 'pnpm exec vitest run src/services/discord-source.test.ts -t "lists channels"'
    options:
      runInCI: false
      cache: false

  # Live crawl into the fact graph. Requires DISCORD_TOKEN + DISCORD_CHANNEL_ID.
  # Tunable via DISCORD_MAX_DAYS / DISCORD_THREADS / DISCORD_LIST_FACTS and DX_ANTHROPIC_API_KEY.
  # `cache: false` so env changes (lookback, key) always take effect — the cached `test` task would not.
  crawl:
    command: 'pnpm exec vitest run src/services/discord-source.test.ts -t "crawls a real channel"'
    options:
      runInCI: false
      cache: false

  # Crawl seed channels into a persistent SQLite file via DiscordPipeline. Requires DISCORD_TOKEN;
  # tunable via DISCORD_CRAWL_CHANNELS / DISCORD_CRAWL_DB / DISCORD_MAX_DAYS. Re-running resumes.
  crawl-demo:
    command: 'pnpm exec vitest run src/testing/crawl-demo.test.ts'
    options:
      runInCI: false
      cache: false

  # Replay the stored SQLite messages (no token) through question extraction and print the tuples.
  questions-demo:
    command: 'pnpm exec vitest run src/testing/questions-demo.test.ts'
    options:
      runInCI: false
      cache: false

  compile:
    args:
      - '--entryPoint=src/index.ts'
      - '--entryPoint=src/DiscordPlugin.ts'
      - '--entryPoint=src/capabilities/index.ts'
      - '--entryPoint=src/meta.ts'
      - '--entryPoint=src/operations/index.ts'
      - '--entryPoint=src/plugin.ts'
      - '--entryPoint=src/translations.ts'
      - '--entryPoint=src/types/index.ts'
      - '--platform=neutral'
