layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - ts-test-storybook
  - pack
  - storybook
  - memoized-llm
tasks:
  compile:
    args:
      - '--entryPoint=src/index.ts'
      - '--entryPoint=src/blueprints/index.ts'
      - '--entryPoint=src/types/index.ts'
      - '--entryPoint=src/operations/index.ts'
  check-module-structure:
    # Fail when the operations entrypoint pulls in `@dxos/react-ui`. The operations
    # module must remain UI-free so it can be loaded in non-DOM environments.
    command: >-
      pnpm exec dx-trace-imports
      --from src/operations/index.ts
      --to "@dxos/react-ui"
      --packages-only
      --conditions source,workerd,worker,node
      --fail-on present
    deps:
      - dx-trace-imports:compile
    inputs:
      - tsconfig.json
      - '@group(production)'
      - /pnpm-lock.yaml
    options:
      timeout: 60
