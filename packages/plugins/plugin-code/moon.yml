layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - ts-test-storybook
  - pack
  - storybook
tasks:
  compile:
    deps:
      - plugin-code:prebuild-lezer
    args:
      - '--entryPoint=src/index.ts'
      - '--entryPoint=src/CodePlugin.tsx'
      - '--entryPoint=src/blueprints/index.ts'
      - '--entryPoint=src/capabilities/index.ts'
      - '--entryPoint=src/components/index.ts'
      - '--entryPoint=src/containers/index.ts'
      - '--entryPoint=src/meta.ts'
      - '--entryPoint=src/operations/index.ts'
      - '--entryPoint=src/plugin.ts'
      - '--entryPoint=src/translations.ts'
      - '--entryPoint=src/types/index.ts'
      - '--platform=neutral'
  prebuild-lezer:
    command: pnpm exec lezer-generator --typeScript ./src/extension/mdl.grammar -o ./src/extension/gen/mdl.ts
    inputs:
      - src/extension/mdl.grammar
    outputs:
      - src/extension/gen/mdl.terms.ts
      - src/extension/gen/mdl.ts
