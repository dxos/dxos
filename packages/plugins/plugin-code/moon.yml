layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - ts-test-storybook
  - pack
  - storybook
tasks:
  build:
    deps:
      - plugin-code:prebuild-lezer
  prebuild-lezer:
    command: pnpm exec lezer-generator --typeScript ./src/extension/mdl.grammar -o
      ./src/extension/gen/mdl.ts
    inputs:
      - src/extension/mdl.grammar
    outputs:
      - src/extension/gen/mdl.terms.ts
      - src/extension/gen/mdl.ts
