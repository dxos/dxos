layer: library
language: typescript
tags:
  - ts-vite-build
  - ts-test
  - ts-test-storybook
  - pack
  - storybook
  - memoized-llm
tasks:
  check-module-structure:
    # Fail when the ./plugin export pulls in `@dxos/react-ui`. The plugin entry must
    # remain UI-free under workerd so it can load in non-DOM environments.
    command: >-
      pnpm exec dx-trace-imports
      --export ./plugin
      --to "@dxos/react-ui"
      --conditions workerd,worker,node
      --fail-on present
    deps:
      - dx-trace-imports:build
      - build
    inputs:
      - tsconfig.json
      - '@group(production)'
      - '^@group(production)'
      - /pnpm-lock.yaml
    options:
      timeout: 60
