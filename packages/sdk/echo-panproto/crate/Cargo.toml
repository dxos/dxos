[package]
name = "echo-panproto-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Wrap panproto (v0.56.1) as a library; expose its transform path to JS.
panproto-inst = { git = "https://github.com/panproto/panproto", tag = "v0.56.1" }
panproto-expr = { git = "https://github.com/panproto/panproto", tag = "v0.56.1" }
panproto-gat = { git = "https://github.com/panproto/panproto", tag = "v0.56.1" }
panproto-schema = { git = "https://github.com/panproto/panproto", tag = "v0.56.1" }
panproto-protocols = { git = "https://github.com/panproto/panproto", tag = "v0.56.1" }
# wasm needs getrandom's js backend if anything pulls it in.
getrandom = { version = "0.2", features = ["js"] }

[profile.release]
opt-level = "s"
