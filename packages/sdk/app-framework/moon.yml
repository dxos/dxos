layer: library
language: typescript
tags:
  - pack
  - ts-vite-build
  - ts-test
  - ts-test-storybook
  - typedoc
  - storybook
tasks:
  build:
    deps:
      - compile-plugin
  compile-plugin:
    command: dx-compile
    args:
      - '--entryPoint=src/vite-plugin/index.ts'
      - '--outputPath=dist/plugin'
      - '--platform=node'
    deps:
      - ^:compile
      - dx-compile:compile
    outputs:
      - dist/plugin
  check-module-structure:
    # Fail when the root export pulls in React. The main entry point must stay
    # React-free (headless consumers like Role, Capabilities, Plugin) — React
    # lives only behind the ./ui entrypoint.
    command: >-
      pnpm exec dx-trace-imports
      --export .
      --to "{react,react-dom}"
      --conditions workerd,worker,node
      --fail-on present
    deps:
      - dx-trace-imports:compile
      - compile
    inputs:
      - tsconfig.json
      - '@group(production)'
      - '^@group(production)'
      - /pnpm-lock.yaml
    options:
      timeout: 60
