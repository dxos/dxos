layer: library
language: typescript
tags:
  - pack
  - ts-vite-build
  - ts-test
  - ts-test-storybook
  - typedoc
  - storybook
tasks:
  build:
    deps:
      - compile-plugin
  compile-plugin:
    command: dx-compile
    args:
      - '--entryPoint=src/vite-plugin/index.ts'
      - '--outputPath=dist/plugin'
      - '--platform=node'
    deps:
      - ^:build
      - dx-compile:build
    outputs:
      - dist/plugin
  check-module-structure:
    # Verify headless entrypoints resolve under workerd conditions (post-build artifacts
    # must exist — catches stale `./workerd` export paths like the removed browser bundle).
    # Then fail when the root export pulls in React; React lives only behind `./ui`.
    script: |
      pnpm exec dx-trace-imports \
        --export . \
        --to "{react,react-dom}" \
        --conditions workerd,worker,node \
        --fail-on present
    deps:
      - dx-trace-imports:build
      - build
    inputs:
      - tsconfig.json
      - package.json
      - '@group(production)'
      - '^@group(production)'
      - /pnpm-lock.yaml
    options:
      timeout: 60
