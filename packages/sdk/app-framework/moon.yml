layer: library
language: typescript
tags:
  - pack
  - ts-vite-build
  - ts-test
  - ts-test-storybook
  - typedoc
  - storybook
tasks:
  build:
    deps:
      - compile-plugin
  compile-plugin:
    command: dx-compile
    args:
      - '--entryPoint=src/vite-plugin/index.ts'
      - '--outputPath=dist/plugin'
      - '--platform=node'
    deps:
      - ^:compile
      - dx-compile:compile
    outputs:
      - dist/plugin
