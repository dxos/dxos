layer: library
language: typescript
tags:
  - ts-vite-build
  - ts-test
  - pack
  - storybook
tasks:
  check-module-structure:
    # Verify headless entrypoints resolve under workerd conditions, then fail when the
    # root export pulls in React (Composer UI lives only behind `./ui`).
    script: |
      pnpm exec dx-trace-imports \
        --export . \
        --to effect \
        --conditions workerd,worker,node \
        --fail-on missing \
        --max-chains 1
      pnpm exec dx-trace-imports \
        --export ./workerd \
        --to effect \
        --conditions workerd,worker,node \
        --fail-on missing \
        --max-chains 1
      pnpm exec dx-trace-imports \
        --export . \
        --to "{react,react-dom}" \
        --conditions workerd,worker,node \
        --fail-on present
    deps:
      - dx-trace-imports:compile
      - compile
    inputs:
      - tsconfig.json
      - package.json
      - '@group(production)'
      - /pnpm-lock.yaml
    options:
      timeout: 60
  test:
    inputs:
      - .storybook/*
      - /tools/storybook-react/.storybook/main.ts
