layer: library
language: typescript
tags:
  - ts-build
  - ts-test
  - ts-test-storybook
  - pack
  - storybook
tasks:
  compile:
    args:
      - '--entryPoint=src/index.ts'
  # Research workflow (all interactive + network + write git-ignored fixtures — never cached / in CI):
  #   env   → render .env.tpl → .env via 1Password (`op inject`); provides DX_ANTHROPIC_API_KEY etc.
  #   auth  → Google OAuth helper: `-- --token` prints a token, `-- --force` re-consents, `-- --revoke` cancels.
  #   sync  → one consent + in-process Gmail sync → fixtures/local/mailbox-feed.json (FETCH_AFTER=yyyy-mm-dd).
  #   bench → run the bench suite (extract facts + all benches); `-- --models qwen --limit 10 --tests tags,facts`.
  #   stats → live table of the bench progress file (rate + ETA); `-- --once` for a single snapshot.
  # Resolve the git-ignored .env from the 1Password template (requires `op` signed in). Run once per
  # session before auth/sync/bench/overnight so DX_ANTHROPIC_API_KEY (+ Google client) are available.
  env:
    command: 'op inject --force -i .env.tpl -o .env'
    options:
      cache: false
      runInCI: false
      interactive: true
  auth:
    command: 'node scripts/google-auth.mjs'
    options:
      cache: false
      runInCI: false
      interactive: true
  sync:
    command: 'node scripts/fetch-fixture.mjs'
    options:
      cache: false
      runInCI: false
      interactive: true
  bench:
    command: 'node scripts/bench.mjs'
    options:
      cache: false
      runInCI: false
      interactive: true
  stats:
    command: 'node scripts/stats.mjs'
    options:
      cache: false
      runInCI: false
      interactive: true
  overnight:
    command: 'node scripts/overnight.mjs'
    options:
      cache: false
      runInCI: false
      interactive: true
