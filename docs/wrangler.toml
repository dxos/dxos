#
# Cloudflare Workers (Static Assets) config for the docs site — assets-only (no Worker script).
# Deployed by .github/workflows/scripts/deploy-env.sh via `wrangler deploy --config <this> --env <env>`.
#

name = "docs"
compatibility_date = "2024-11-01"

[assets]
directory = "./dist"
# Multi-page static site: serve /404.html for unmatched routes.
not_found_handling = "404-page"

# Per-env Worker names (production = bare name / custom domain; others suffixed). Inherits [assets].
[env.production]
name = "docs"

[env.staging]
name = "docs-staging"

[env.main]
name = "docs-main"
