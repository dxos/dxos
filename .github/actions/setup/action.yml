name: Setup
description: Setup the environment for the other workflows

runs:
  using: 'composite'
  steps:
    # TODO(wittjosiah): This shouldn't be necessary, but it is when running in BuildJet.
    #   It's not clear why, the Docker image is setup for the user to own the workspace.
    #   The checkout action also already runs this internally as a step as well.
    - name: Mark workspace as safe
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      shell: bash

    # TODO(wittjosiah): Install moon in docker image?
    - uses: moonrepo/setup-toolchain@v0
      with:
        # IMPORTANT: Keep in-sync with .prototools
        moon-version: '2.0.4'

    # IMPORTANT: Keep bun-version in-sync with .prototools.
    # setup-bun is used in addition to proto because proto only installs the
    # `bun` shim, not `bunx`, which moon tasks invoke directly.
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.3.4'

    - name: Log out debug info
      run: |
        node --version
        bun --version
        bunx --version
      shell: bash

    - name: Bun Install Cache Path
      id: bun-cache
      run: echo "bun-cache=$(bun pm cache)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Get Node version
      id: node-version
      run: echo "version=$(node --version)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Cache bun install
      uses: actions/cache@v4
      with:
        path: ${{ steps.bun-cache.outputs.bun-cache }}
        key: ${{ runner.os }}-node-${{ steps.node-version.outputs.version }}-bun-store-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ steps.node-version.outputs.version }}-bun-store-

    # --os=* --cpu=* installs optional platform-specific packages for all
    # architectures (e.g. @opentui/core-darwin-arm64 on linux-x64 runners).
    # This is required for cross-platform builds such as cli:compile.
    - name: Install dependencies
      run: bun install --frozen-lockfile --os=* --cpu=*
      shell: bash
