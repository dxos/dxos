name: Check

on:
  pull_request:
  merge_group:

  push:
    branches:
      - main
      - ci/*

  schedule:
    - cron: '0 4 * * 1-5'

  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

      e2e:
        type: boolean
        description: 'Run the e2e tests'
        required: false
        default: false

permissions:
  contents: read
  packages: read

env:
  DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
  DISCORD_TEST_REPORT_WEBHOOK: ${{ secrets.DISCORD_TEST_REPORT_WEBHOOK }}
  TRUNK_TOKEN: ${{ secrets.TRUNK_TOKEN }}

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# https://moonrepo.dev/docs/guides/ci
jobs:
  check:
    permissions:
      contents: read
      packages: read
    runs-on: depot-ubuntu-24.04-8
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 30
    steps:
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled && !inputs.e2e }}
        with:
          detached: true

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Extract branch
        id: extract_branch
        uses: ./.github/actions/branch

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check for import cycles
        run: pnpm run check-cycles

      - name: Check publish config
        run: pnpm run check-publish-config

      - name: Check package.json paths
        run: pnpm run pkg-lint

      - name: Check formatting
        run: pnpm run format-check

      - name: Check Affected
        if: ${{ steps.extract_branch.outputs.branch != 'main' }}
        run: moon run :lint :build --affected remote

      - name: Check All
        if: ${{ steps.extract_branch.outputs.branch == 'main' }}
        run: moon run :lint :build

      - name: Check module structure (affected)
        if: ${{ steps.extract_branch.outputs.branch != 'main' }}
        run: moon run :check-module-structure --affected remote

      - name: Check module structure (all)
        if: ${{ steps.extract_branch.outputs.branch == 'main' }}
        run: moon run :check-module-structure

      - name: Check for peer dependency issues
        run: pnpm install --resolution-only --no-frozen-lockfile

  test:
    strategy:
      matrix:
        node-version: ['24.11.1']
    runs-on: depot-ubuntu-24.04-8
    container:
      image: ghcr.io/dxos/gh-actions:${{ matrix.node-version }}
      credentials:
        username: dxos-bot
        password: ${{ github.token }}
    timeout-minutes: 30
    env:
      NODE_VERSION: ${{ matrix.node-version }}
      # Opt the test job in to flaky-tagged suites (Trunk pass-on-rerun keeps signal),
      # while still excluding the heavier opt-in tag families.
      VITEST_TAGS_FILTER: '!llm && !sync && !sync-e2e && !functions-e2e && !tracing-e2e && !compiler && !manual'
      VITEST_ENV: 'node'
      VITEST_COVERAGE: ${{ secrets.CODECOV_TOKEN != '' && 'true' || 'false' }}
      VITEST_XML_REPORT: 'true'
      # NOTE: Browser tests also require a process for chromium. Limiting to 4 provides headroom for those processes.
      MOON_CONCURRENCY: 4
      # Exposed so step conditions can branch on token presence without referencing
      # secrets directly (secrets are not allowed in if: expressions).
      TRUNK_TOKEN: ${{ secrets.TRUNK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Extract branch
        id: extract_branch
        uses: ./.github/actions/branch

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright
        run: pnpm run install-playwright

      - name: Clean stale test results
        run: rm -rf test-results

      - name: Test Affected
        if: ${{ steps.extract_branch.outputs.branch != 'main' && env.TRUNK_TOKEN != '' }}
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: 'test-results/**/results.xml'
          org-slug: dxos
          token: ${{ secrets.TRUNK_TOKEN }}
          quarantine: true
          run: moon run :test :test-browser --affected remote -- --no-file-parallelism

      # Fallback for fork PRs and local runs where TRUNK_TOKEN is unavailable.
      - name: Test Affected (no analytics)
        if: ${{ steps.extract_branch.outputs.branch != 'main' && env.TRUNK_TOKEN == '' }}
        run: moon run :test :test-browser --affected remote -- --no-file-parallelism

      - name: Test All
        if: ${{ steps.extract_branch.outputs.branch == 'main' && env.TRUNK_TOKEN != '' }}
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: 'test-results/**/results.xml'
          org-slug: dxos
          token: ${{ secrets.TRUNK_TOKEN }}
          quarantine: true
          run: moon exec --on-failure continue :test :test-browser -- --no-file-parallelism

      # Fallback for forks running against their own main where TRUNK_TOKEN is unavailable.
      - name: Test All (no analytics)
        if: ${{ steps.extract_branch.outputs.branch == 'main' && env.TRUNK_TOKEN == '' }}
        run: moon exec --on-failure continue :test :test-browser -- --no-file-parallelism

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-report-${{ matrix.node-version }}
          path: test-results
          retention-days: 7

      - uses: codecov/codecov-action@v5
        if: ${{ matrix.node-version == '24.11.1' && env.VITEST_COVERAGE == 'true' }}
        with:
          directory: ./coverage
          fail_ci_if_error: false
          handle_no_reports_found: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  # Storybook tests run on their own runner, in parallel with `test`, so the (large)
  # set of :test-storybook tasks no longer serializes behind unit/browser tests in the
  # `test` job. File parallelism stays disabled here too — overloaded runners flake — so
  # the win is concurrency across machines, not within one.
  storybook:
    strategy:
      matrix:
        node-version: ['24.11.1']
    runs-on: depot-ubuntu-24.04-8
    container:
      image: ghcr.io/dxos/gh-actions:${{ matrix.node-version }}
      credentials:
        username: dxos-bot
        password: ${{ github.token }}
    timeout-minutes: 30
    env:
      NODE_VERSION: ${{ matrix.node-version }}
      # Opt in to flaky-tagged suites (Trunk pass-on-rerun keeps signal),
      # while still excluding the heavier opt-in tag families.
      VITEST_TAGS_FILTER: '!llm && !sync && !sync-e2e && !functions-e2e && !tracing-e2e && !compiler && !manual'
      VITEST_ENV: 'node'
      VITEST_COVERAGE: ${{ secrets.CODECOV_TOKEN != '' && 'true' || 'false' }}
      VITEST_XML_REPORT: 'true'
      # NOTE: Storybook tests spawn a process for chromium. Limiting to 4 provides headroom for those processes.
      MOON_CONCURRENCY: 4
      # Exposed so step conditions can branch on token presence without referencing
      # secrets directly (secrets are not allowed in if: expressions).
      TRUNK_TOKEN: ${{ secrets.TRUNK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Extract branch
        id: extract_branch
        uses: ./.github/actions/branch

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright
        run: pnpm run install-playwright

      - name: Clean stale test results
        run: rm -rf test-results

      - name: Test Storybook Affected
        if: ${{ steps.extract_branch.outputs.branch != 'main' && env.TRUNK_TOKEN != '' }}
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: 'test-results/**/results.xml'
          org-slug: dxos
          token: ${{ secrets.TRUNK_TOKEN }}
          quarantine: true
          run: moon run :test-storybook --affected remote -- --no-file-parallelism

      # Fallback for fork PRs and local runs where TRUNK_TOKEN is unavailable.
      - name: Test Storybook Affected (no analytics)
        if: ${{ steps.extract_branch.outputs.branch != 'main' && env.TRUNK_TOKEN == '' }}
        run: moon run :test-storybook --affected remote -- --no-file-parallelism

      - name: Test Storybook All
        if: ${{ steps.extract_branch.outputs.branch == 'main' && env.TRUNK_TOKEN != '' }}
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: 'test-results/**/results.xml'
          org-slug: dxos
          token: ${{ secrets.TRUNK_TOKEN }}
          quarantine: true
          run: moon exec --on-failure continue :test-storybook -- --no-file-parallelism

      # Fallback for forks running against their own main where TRUNK_TOKEN is unavailable.
      - name: Test Storybook All (no analytics)
        if: ${{ steps.extract_branch.outputs.branch == 'main' && env.TRUNK_TOKEN == '' }}
        run: moon exec --on-failure continue :test-storybook -- --no-file-parallelism

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-report-storybook-${{ matrix.node-version }}
          path: test-results
          retention-days: 7

      - uses: codecov/codecov-action@v5
        if: ${{ matrix.node-version == '24.11.1' && env.VITEST_COVERAGE == 'true' }}
        with:
          directory: ./coverage
          fail_ci_if_error: false
          handle_no_reports_found: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  e2e:
    # e2e runs on pushes/schedules to main AND on the Changesets "Version Packages" PR (so we never
    # publish untested). For push events github.ref is refs/heads/<branch>; for pull_request events
    # github.ref is refs/pull/N/merge so we also check github.head_ref (the source branch name, set only
    # on pull_request events) to catch the changesets/action PR branch (changeset-release/<base>).
    if: >-
      startsWith(github.ref, 'refs/heads/main') ||
      startsWith(github.ref, 'refs/heads/changeset-release/') ||
      startsWith(github.head_ref, 'changeset-release/') ||
      inputs.e2e
    runs-on: depot-ubuntu-24.04-8
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 60
    env:
      DX_ENVIRONMENT: ci
      DX_EDGE_BASE_URL: 'wss://edge-main.dxos.workers.dev/'
      DX_TELEMETRY_TAG: e2e
      DX_PWA: false
    steps:
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          detached: true

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Extract branch
        id: extract_branch
        uses: ./.github/actions/branch

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright
        run: pnpm run install-playwright

      - name: Bundle Affected
        if: ${{ steps.extract_branch.outputs.branch != 'main' }}
        run: moon run :bundle --affected remote

      - name: Bundle All
        if: ${{ steps.extract_branch.outputs.branch == 'main' }}
        run: moon run :bundle

      # Clear Storybook Vite cache in every package so Storybook dev server does a fresh optimizeDeps run.
      # Avoids 504 Outdated Optimize Dep when graph differs from bundle step.
      # Storybook puts cache under node_modules/.cache/storybook/<hash>/sb-vite per package.
      - name: Clear Storybook Vite cache
        run: find . -type d -path '*/node_modules/.cache/storybook' -prune -print0 | xargs -0 rm -rf

      - name: Clean stale test results
        run: rm -rf test-results

      - name: Test Affected
        if: ${{ steps.extract_branch.outputs.branch != 'main' }}
        timeout-minutes: 45
        uses: trunk-io/analytics-uploader@v1
        env:
          PLAYWRIGHT_BROWSER: all
        with:
          junit-paths: 'test-results/playwright/report/*.xml'
          org-slug: dxos
          token: ${{ secrets.TRUNK_TOKEN }}
          quarantine: true
          run: moon run :e2e --affected remote --concurrency=1

      - name: Test All
        if: ${{ steps.extract_branch.outputs.branch == 'main' }}
        timeout-minutes: 45
        uses: trunk-io/analytics-uploader@v1
        env:
          PLAYWRIGHT_BROWSER: all
        with:
          junit-paths: 'test-results/playwright/report/*.xml'
          org-slug: dxos
          token: ${{ secrets.TRUNK_TOKEN }}
          quarantine: true
          run: moon exec --on-failure continue :e2e --concurrency=1

      - name: Upload Traces
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: test-results/playwright
          retention-days: 7

      - name: Send test report
        if: ${{ (success() || failure()) && github.event_name == 'schedule' }}
        uses: ./.github/actions/test-report
        with:
          name: ${{ github.job }}
          result: ${{ job.status }}

  report:
    needs: [test, storybook]
    if: always() && github.event_name == 'schedule'
    runs-on: depot-ubuntu-24.04-8
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Send test report
        uses: ./.github/actions/test-report
        with:
          name: test-24.11.1
          result: ${{ needs.test.result }}
      - name: Send storybook report
        uses: ./.github/actions/test-report
        with:
          name: storybook-24.11.1
          result: ${{ needs.storybook.result }}

  # Advisory changeset reminder (NOT a gate): when a PR changes publishable source but has no
  # `.changeset/*.md`, post/update a single sticky comment; remove it once a changeset is added.
  # A change that needs no release just omits the changeset — no empty changeset required.
  # Same-repo PRs only — fork PRs get a read-only token and cannot be commented on.
  changeset-reminder:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect missing changeset
        id: detect
        env:
          CHANGESET_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: node scripts/check-changeset.mjs

      - name: Post or remove reminder comment
        uses: actions/github-script@v7
        env:
          MISSING: ${{ steps.detect.outputs.missing }}
          PACKAGES: ${{ steps.detect.outputs.packages }}
        with:
          script: |
            const marker = '<!-- changeset-reminder -->';
            const missing = process.env.MISSING === 'true';
            const packages = process.env.PACKAGES || '';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (missing) {
              const body = [
                marker,
                '### 🦋 No changeset found',
                '',
                'This PR changes publishable source but has no `.changeset/*.md`.',
                packages ? `Affected: ${packages}` : '',
                '',
                '- If the change is consumer-relevant (worth a changelog entry), run `pnpm changeset` and commit the file.',
                "- If it isn't changelog-relevant (chore / refactor / internal), you can ignore this — the code still ships with the next release.",
              ].filter(Boolean).join('\n');
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } else if (existing) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
            }
