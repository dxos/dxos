name: Check

on:
  pull_request_target:
  merge_group:

  push:
    branches:
      - main
      - ci/*

  schedule:
    - cron: '0 4 * * 1-5'

  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

      e2e:
        type: boolean
        description: 'Run the e2e tests'
        required: false
        default: false

# Limit GITHUB_TOKEN to read-only for fork code execution safety.
# pull-requests: write is needed for moonrepo/run-report-action to post PR comments.
# packages: read is needed to pull the ghcr.io container image.
permissions:
  contents: read
  pull-requests: write
  packages: read

env:
  DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
  DISCORD_TEST_REPORT_WEBHOOK: ${{ secrets.DISCORD_TEST_REPORT_WEBHOOK }}
  TRUNK_TOKEN: ${{ secrets.TRUNK_TOKEN }}

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# https://moonrepo.dev/docs/guides/ci
jobs:
  check:
    # Gate fork PRs on maintainer approval before running fork code with secrets in scope.
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'external-pr' || '' }}
    runs-on: depot-ubuntu-24.04-8
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 30
    steps:
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled && !inputs.e2e }}
        with:
          detached: true

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          # pull_request_target checks out the base branch by default; explicitly
          # check out the PR head so we lint/build the contributor's actual code.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Extract branch
        id: extract_branch
        uses: ./.github/actions/branch

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check for import cycles
        run: pnpm run check-cycles

      - name: Check formatting
        run: pnpm run format-check

      - name: Check Affected
        if: ${{ steps.extract_branch.outputs.branch != 'main' }}
        run: moon run :lint :build --affected remote

      - name: Check All
        if: ${{ steps.extract_branch.outputs.branch == 'main' }}
        run: moon run :lint :build

      - name: Check for peer dependency issues
        run: pnpm install --resolution-only --no-frozen-lockfile

      - uses: 'moonrepo/run-report-action@v1'
        if: (success() || failure()) && github.event_name == 'pull_request_target'
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    strategy:
      matrix:
        node-version: ['24.11.1']
    # Fork PRs: gate on maintainer approval AND isolate secrets — only TRUNK_TOKEN
    # and CODECOV_TOKEN reach the test runner via the reusable workflow.
    uses: ./.github/workflows/run-tests.yml
    with:
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      node-version: ${{ matrix.node-version }}
    secrets:
      TRUNK_TOKEN: ${{ secrets.TRUNK_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    # e2e only runs on direct pushes to release branches, never on PRs.
    if: >-
      github.event_name != 'pull_request_target' && (
        startsWith(github.ref, 'refs/heads/main') ||
        startsWith(github.ref, 'refs/heads/rc-') ||
        startsWith(github.ref, 'refs/heads/hotfix-') ||
        startsWith(github.ref, 'refs/heads/release-please-') ||
        inputs.e2e
      )
    runs-on: depot-ubuntu-24.04-8
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 60
    env:
      DX_ENVIRONMENT: ci
      DX_EDGE_BASE_URL: 'wss://edge-main.dxos.workers.dev/'
      DX_TELEMETRY_TAG: e2e
      DX_PWA: false
      NODE_OPTIONS: --max-old-space-size=12288
    steps:
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          detached: true

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Extract branch
        id: extract_branch
        uses: ./.github/actions/branch

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright
        run: pnpm run install-playwright

      - name: Bundle Affected
        if: ${{ steps.extract_branch.outputs.branch != 'main' }}
        run: moon run :bundle --affected remote

      - name: Bundle All
        if: ${{ steps.extract_branch.outputs.branch == 'main' }}
        run: moon run :bundle

      # Clear Storybook Vite cache in every package so Storybook dev server does a fresh optimizeDeps run.
      # Avoids 504 Outdated Optimize Dep when graph differs from bundle step.
      # Storybook puts cache under node_modules/.cache/storybook/<hash>/sb-vite per package.
      - name: Clear Storybook Vite cache
        run: find . -type d -path '*/node_modules/.cache/storybook' -prune -print0 | xargs -0 rm -rf

      - name: Clean stale test results
        run: rm -rf test-results

      - name: Test Affected
        if: ${{ steps.extract_branch.outputs.branch != 'main' }}
        uses: trunk-io/analytics-uploader@v1
        env:
          PLAYWRIGHT_BROWSER: all
        with:
          junit-paths: 'test-results/playwright/report/*.xml'
          org-slug: dxos
          token: ${{ secrets.TRUNK_TOKEN }}
          quarantine: true
          run: moon run :e2e --affected remote --concurrency=1

      - name: Test All
        if: ${{ steps.extract_branch.outputs.branch == 'main' }}
        uses: trunk-io/analytics-uploader@v1
        env:
          PLAYWRIGHT_BROWSER: all
        with:
          junit-paths: 'test-results/playwright/report/*.xml'
          org-slug: dxos
          token: ${{ secrets.TRUNK_TOKEN }}
          quarantine: true
          run: moon exec --on-failure continue :e2e --concurrency=1

      - uses: 'moonrepo/run-report-action@v1'
        if: (success() || failure()) && github.event_name == 'pull_request_target'
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Traces
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: test-results/playwright
          retention-days: 7

      - name: Send test report
        if: ${{ (success() || failure()) && github.event_name == 'schedule' }}
        uses: ./.github/actions/test-report
        with:
          name: ${{ github.job }}
          result: ${{ job.status }}
