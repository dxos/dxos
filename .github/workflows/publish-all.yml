name: Publish

# npm publishing for Group A (core/SDK) and Group B (plugins + cli). This filename is load-bearing: npm's
# OIDC trusted publisher is configured against `publish-all.yml`, so every `changeset publish` MUST run from
# here (a different filename fails OIDC). Two flows, by trigger:
#
#   - push to main (automatic → @latest): maintain the Changesets "Version Packages" PR; merging that PR
#     (a push with the versions bumped and no changesets left) publishes the bumped packages to npm @latest
#     with provenance. The human gate is merging the PR — nobody runs changeset/publish locally.
#   - manual workflow_dispatch (→ @next): cut a SNAPSHOT pre-release — `changeset version --snapshot next`
#     then `changeset publish --tag next`. Ephemeral versions, no commit, no git tags, no `pre` mode.
#
# Apps deploy via deploy-apps.yml (which also cuts the versioned Composer production release), never here.

on:
  push:
    branches:
      - main
  workflow_dispatch: {} # Manual dispatch = a @next snapshot pre-release (pick the commit via the ref selector).

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # Create the Version Packages PR + git tags (@latest flow).
  pull-requests: write # Maintain the Version Packages PR.
  id-token: write # npm trusted-publisher OIDC + provenance.

jobs:
  publish:
    if: github.repository == 'dxos/dxos'
    # GitHub-hosted runner required for npm provenance (sigstore attestation).
    runs-on: ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # This repo does not use Changesets `pre` mode — the @next channel uses snapshot releases instead.
      # A stray `.changeset/pre.json` would silently turn a stable publish into a pre-release, so fail fast.
      - name: Guard against pre-release state on main
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "::error::.changeset/pre.json present — @next uses snapshot releases, not pre mode. Remove it (changeset pre exit)."
            exit 1
          fi

      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Isolate publish cache from PR caches (cache-poisoning defense).
          cache-scope: publish
          verify-integrity: 'true'

      # @next (dispatch): stamp ephemeral snapshot versions for packages with pending changesets, then
      # mirror them into version.ts / tauri.conf.json — before the build, so it builds the snapshot version.
      # No commit, no lockfile rewrite; the bump is throwaway.
      - name: Version (snapshot)
        if: github.event_name == 'workflow_dispatch'
        run: |
          pnpm exec changeset version --snapshot next
          node scripts/sync-versions.mjs

      - name: Build
        run: moon run :build
        env:
          NODE_ENV: production

      # Shell must be bundled before npm publish.
      - name: Bundle Shell
        run: moon run shell:bundle
        env:
          NODE_ENV: production

      # @latest (push): when changesets exist, maintains/updates the "Version Packages" PR; when that PR is
      # merged (versions bumped, no changesets remain), runs the publish command instead.
      - name: Version PR or publish (@latest)
        if: github.event_name == 'push'
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: 'Version packages'
          title: 'Version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true' # provenance via OIDC; trusted publisher means no NPM_TOKEN.

      # @next (dispatch): publish the snapshot versions under the `next` dist-tag. --no-git-tag: snapshots
      # are ephemeral and never tagged. No-op when no changesets are pending.
      - name: Publish @next (snapshot)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec changeset publish --tag next --no-git-tag
        env:
          NPM_CONFIG_PROVENANCE: 'true' # provenance via OIDC; trusted publisher means no NPM_TOKEN.
