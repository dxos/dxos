# Triage step for issues filed from the Composer in-app feedback form
# (see packages/plugins/plugin-support/src/containers/FeedbackPanel/). The
# implementation step lives in `claude-composer-implement.yml`; see also
# `agents/prompts/claude-triage-and-implement-workflows.md` for design notes.
name: Claude Composer triage

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

concurrency:
  # One triage per issue at a time; cancel a re-trigger if labels change while running.
  group: claude-composer-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    # Only run on Composer-labeled issues — never every issue. Avoid retriggering
    # on labels we (or the implement workflow) add ourselves, or on bot events.
    #
    # PILOT GATE: requires the `claude-pilot` label in addition to `Composer`.
    # The action currently crashes mid-run on its own progress-spinner GIF
    # (https://github.com/anthropics/claude-code-action/issues/1351). Until
    # that upstream fix lands, only issues explicitly labeled `claude-pilot`
    # will trigger triage — so we don't keep burning ~$0.10 per filed issue
    # for a guaranteed crash. To re-enable, delete the
    # `contains(github.event.issue.labels.*.name, 'claude-pilot') &&` line
    # from the `if:` block below (and this comment), once #1351 ships.
    if: >
      contains(github.event.issue.labels.*.name, 'Composer') &&
      contains(github.event.issue.labels.*.name, 'claude-pilot') &&
      !contains(github.event.issue.labels.*.name, 'needs-implementation') &&
      !contains(github.event.issue.labels.*.name, 'needs-info') &&
      !contains(github.event.issue.labels.*.name, 'claude-implementing') &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          # The triage job only reads the repo — don't persist the GITHUB_TOKEN
          # in `.git/config` so a downstream `git push` can't leak it. Matches
          # the convention in `check.yml`.
          persist-credentials: false

      - name: Run Claude triage
        uses: anthropics/claude-code-action@beta
        with:
          # The org-level `ANTHROPIC_API_KEY` is currently rejected by Claude
          # as "Invalid API key" (likely rotated). A `CLAUDE_CODE_OAUTH_TOKEN`
          # repo secret was added 2026-05-23 as the working alternative; the
          # action accepts either input.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # `mode: tag` (the default) is required — `mode: agent` only accepts
          # `workflow_dispatch` and `schedule` events per the action's beta
          # source (`src/modes/agent/index.ts`), not `issues:`. In tag mode,
          # supplying a non-empty `direct_prompt` triggers the action
          # unconditionally (see `checkContainsTrigger` in the action source),
          # so the workflow's own `if:` gate on the Composer label is what
          # filters which events get here, and `direct_prompt` then forces
          # the run.
          max_turns: 3
          # `direct_prompt` carries the triage instructions. (HEAD of the
          # action's repo renamed this to `prompt` — swap when @beta catches
          # up.)
          direct_prompt: |
            You are triaging a GitHub issue filed from the Composer in-app
            feedback form. The body contains a markdown trailer with the
            user-reported type, severity, area (plugin id), and app version.
            It may include a screenshot.

            Decide whether the issue is ACTIONABLE.

            An issue is actionable when at least ONE of:
              - It identifies a clear bug with enough detail to reproduce
                (steps, expected vs actual, screenshot).
              - It describes a self-contained feature request that could
                fit in a single PR (under ~500 LOC, no architectural debate).

            An issue is NOT actionable when:
              - The body is empty, vague, or asks a question rather than
                reporting a defect.
              - It requires architectural decisions, design discussion,
                or trade-off choices that need a human.
              - The reported behaviour is intentional / a duplicate of an
                existing issue (search the repo first).
              - It crosses multiple plugins or requires changes to core
                framework packages — flag for human review.

            ## Output

            Post ONE comment in this exact format:

              **Triage verdict:** ACTIONABLE | NEEDS-INFO | NOT-ACTIONABLE
              **Reasoning:** <1-3 sentences>
              **Suggested approach:** <only if ACTIONABLE; brief plan>
              **Missing info:** <only if NEEDS-INFO; bullet list>

            Then take ONE of these label actions:
              - If ACTIONABLE → add the label `needs-implementation`.
              - If NEEDS-INFO → add the label `needs-info`.
              - If NOT-ACTIONABLE → close the issue with a polite reason.

            DO NOT:
              - Open a PR. The implementation phase runs separately.
              - Modify the issue body or title.
              - Add labels other than the three above.
              - Mark anything ACTIONABLE if you have any doubt — leaning
                conservative is fine. Human reviewers can override by
                adding `needs-implementation` manually.
