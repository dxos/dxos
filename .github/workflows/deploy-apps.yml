name: Deploy Apps

# Single workflow for all app deploys. The app set is derived from the target environment
# (deploy-manifest.json `environments`): main → all main-enabled apps (auto on push); labs → composer;
# staging → composer + docs; production → all. Fully decoupled from npm publishing.
#
# Production additionally cuts a versioned Composer release (bump composer-app/crx, commit to main, tag
# composer-v<x>) — the ONLY path that advances Composer's version (Composer is not in Changesets). The other
# apps are unversioned and just deploy. There are no separate release workflows; that logic is the
# production-only `release` job below. See docs/design/app-release-spec.md.
#
# "What's deployed where" is tracked by per-app floating git tags `<app>/<environment>` (non-main). No
# GitHub Environments.

on:
  push:
    branches:
      - main
      # TEMP(remove before merge): exercise the pipeline end-to-end on this release branch (deploys labs;
      # tauri stays skipped since it keys off the dispatch environment). Push is the only pre-merge test
      # path — a new workflow isn't workflow_dispatch-able until it lands on main.
      - claude/hopeful-jennings-bd7969
  workflow_dispatch:
    inputs:
      environment:
        # The app set is derived from the environment (deploy-manifest.json): labs → composer,
        # staging → composer + docs, production → all. Choose the commit via the branch/tag selector.
        description: Target environment
        type: choice
        options: [labs, staging, production]
        default: labs
      bump:
        # Only used by the production `release` job (the Composer version bump); ignored otherwise.
        description: Composer version bump — production only
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  # One in-flight deploy per environment.
  group: deploy-${{ inputs.environment || 'main' }}
  cancel-in-progress: true

permissions:
  contents: write # Commit the Composer version bump to main + push version / deploy pointer tags.

jobs:
  # PRODUCTION ONLY — cut a versioned Composer release: bump composer-app/crx, record it on main, tag
  # composer-v<x>. Skipped for main/labs/staging (their deploys carry no version bump). The bumped commit
  # is what the rest of the run builds + deploys (via needs.release.outputs.sha).
  release:
    if: github.repository == 'dxos/dxos' && inputs.environment == 'production'
    runs-on: depot-ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 30
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main # A production release always cuts from main.

      - name: Setup
        uses: ./.github/actions/setup

      # composer-app + composer-crx share the desktop/extension version line; bump both in lockstep. Plain
      # semver bump (Composer is not in Changesets) — a targeted version-line edit to keep the diff minimal.
      - name: Bump version
        id: bump
        run: |
          next=$(node -e '
            const fs = require("fs");
            const bump = process.argv[1];
            const cur = JSON.parse(fs.readFileSync("packages/apps/composer-app/package.json", "utf8")).version;
            const [maj, min, pat] = cur.split("-")[0].split(".").map(Number);
            const next = bump === "major" ? `${maj + 1}.0.0` : bump === "minor" ? `${maj}.${min + 1}.0` : `${maj}.${min}.${pat + 1}`;
            for (const p of ["composer-app", "composer-crx"]) {
              const f = "packages/apps/" + p + "/package.json";
              fs.writeFileSync(f, fs.readFileSync(f, "utf8").replace(/^(  "version": ")[^"]*(",)$/m, `$1${next}$2`));
            }
            process.stdout.write(next);
          ' "${{ inputs.bump }}")
          node scripts/sync-versions.mjs
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Composer -> $next"

      - name: Commit + tag on main
        id: commit
        run: |
          git config user.name 'dxos-bot'
          git config user.email 'bot@dxos.org'
          git add -A
          git commit -m "chore(composer): release v${{ steps.bump.outputs.version }}"
          git tag "composer-v${{ steps.bump.outputs.version }}"
          git push --follow-tags origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Build Composer's web bundle ONCE and share it as an artifact so the web deploy + native (Tauri) jobs
  # don't each rebuild it. Runs where a native build co-runs (labs/staging/production) or the labs test-push.
  build-bundle:
    needs: [release]
    if: >-
      !cancelled() && needs.release.result != 'failure' && github.repository == 'dxos/dxos' &&
      (inputs.environment == 'labs' || inputs.environment == 'staging' || inputs.environment == 'production'
       || (github.event_name == 'push' && github.ref_name != 'main'))
    runs-on: depot-ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 90
    env:
      DEPLOY_ENV: ${{ inputs.environment || (github.ref_name == 'main' && 'main' || 'labs') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          # On production, the bumped release commit; otherwise the triggering commit.
          ref: ${{ needs.release.outputs.sha || github.sha }}

      - name: Set environment variables (Cloudflare creds, PostHog, …)
        run: .github/workflows/scripts/populate-env.sh "$DEPLOY_ENV" >> $GITHUB_ENV
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          COMPOSER_APP_PROD_POSTHOG_API_KEY: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_API_KEY }}
          COMPOSER_APP_PROD_POSTHOG_PROJECT_ID: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_PROJECT_ID }}
          COMPOSER_APP_PROD_POSTHOG_FEEDBACK_SURVEY_ID: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_FEEDBACK_SURVEY_ID }}
          COMPOSER_APP_TEST_POSTHOG_API_KEY: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_API_KEY }}
          COMPOSER_APP_TEST_POSTHOG_PROJECT_ID: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_PROJECT_ID }}
          COMPOSER_APP_TEST_POSTHOG_FEEDBACK_SURVEY_ID: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_FEEDBACK_SURVEY_ID }}
          DX_DISCORD_WEBHOOK_URL: ${{ secrets.DX_DISCORD_WEBHOOK_URL }}
          DX_POSTHOG_API_HOST: ${{ secrets.DX_POSTHOG_API_HOST }}
          IPDATA_API_KEY: ${{ secrets.IPDATA_API_KEY }}
          IPFS_API_SECRET: ${{ secrets.IPFS_API_SECRET }}

      - name: Setup
        uses: ./.github/actions/setup

      # Build only — the artifact is deployed by `deploy` and embedded by the tauri jobs.
      - name: Build Composer bundle
        run: .github/workflows/scripts/bundle-env.mjs "$DEPLOY_ENV" composer
        env:
          NODE_ENV: production

      - name: Upload Composer bundle
        uses: actions/upload-artifact@v4
        with:
          name: composer-bundle
          path: packages/apps/composer-app/out/composer
          include-hidden-files: true
          retention-days: 1

  deploy:
    needs: [release, build-bundle]
    # Run when the prep jobs succeeded or were skipped (main / static-only); skip only on a failure.
    if: >-
      !cancelled() && needs.release.result != 'failure' && needs.build-bundle.result != 'failure' &&
      github.repository == 'dxos/dxos'
    runs-on: depot-ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 90
    env:
      # Dispatch → the chosen env. Push → `main` (rolling) for main, else `labs` (the TEMP branch trigger).
      DEPLOY_ENV: ${{ inputs.environment || (github.ref_name == 'main' && 'main' || 'labs') }}
      DEPLOY_REF: ${{ needs.release.outputs.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ needs.release.outputs.sha || github.sha }}

      # Select the env file by the DEPLOY environment (not the git branch) — environment is a deploy
      # parameter, so a production deploy running from main must still read env/production.
      - name: Set environment variables (Cloudflare creds, PostHog, …)
        run: .github/workflows/scripts/populate-env.sh "$DEPLOY_ENV" >> $GITHUB_ENV
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          COMPOSER_APP_PROD_POSTHOG_API_KEY: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_API_KEY }}
          COMPOSER_APP_PROD_POSTHOG_PROJECT_ID: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_PROJECT_ID }}
          COMPOSER_APP_PROD_POSTHOG_FEEDBACK_SURVEY_ID: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_FEEDBACK_SURVEY_ID }}
          COMPOSER_APP_TEST_POSTHOG_API_KEY: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_API_KEY }}
          COMPOSER_APP_TEST_POSTHOG_PROJECT_ID: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_PROJECT_ID }}
          COMPOSER_APP_TEST_POSTHOG_FEEDBACK_SURVEY_ID: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_FEEDBACK_SURVEY_ID }}
          DX_DISCORD_WEBHOOK_URL: ${{ secrets.DX_DISCORD_WEBHOOK_URL }}
          DX_POSTHOG_API_HOST: ${{ secrets.DX_POSTHOG_API_HOST }}
          IPDATA_API_KEY: ${{ secrets.IPDATA_API_KEY }}
          IPFS_API_SECRET: ${{ secrets.IPFS_API_SECRET }}

      - name: Setup
        uses: ./.github/actions/setup

      # Reuse the prebuilt Composer bundle when the prep job produced one — populating out/composer means
      # bundle-env.mjs reuses it instead of rebuilding.
      - name: Download Composer bundle
        if: needs.build-bundle.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: composer-bundle
          path: packages/apps/composer-app/out/composer

      # Build any app not already present (bundle-env.mjs skips populated output dirs), then deploy them all.
      - name: Bundle apps
        run: .github/workflows/scripts/bundle-env.mjs "$DEPLOY_ENV"
        env:
          NODE_ENV: production

      - name: Deploy apps
        run: .github/workflows/scripts/deploy-env.mjs "$DEPLOY_ENV"
        env:
          NODE_ENV: production

      # Floating pointer to the SHA deployed for each app+env (the branch-pointer replacement). `main` is the
      # branch tip (auto-deployed on push) so it carries no tag; every other env tags each app it deployed.
      - name: Update deploy pointer tags
        if: env.DEPLOY_ENV != 'main'
        run: |
          for app in $(node -e '
            const m = require("./.github/workflows/deploy-manifest.json");
            const env = process.argv[1];
            console.log(Object.entries(m).filter(([n, c]) => n !== "//" && c.environments?.includes(env)).map(([n]) => n).join(" "));
          ' "$DEPLOY_ENV"); do
            tag="${app}/${DEPLOY_ENV}"
            git tag -f "$tag" "$DEPLOY_REF"
            git push -f origin "refs/tags/$tag"
          done

  # Desktop/mobile build for Composer, for the named environments (not `main` — a signed build per push is
  # too costly). CrabNebula channel is derived from the environment inside the reusable workflow; iOS → App
  # Store Connect happens on `labs` only. On production it builds the bumped release commit.
  tauri:
    needs: [release, build-bundle]
    if: >-
      !cancelled() && needs.release.result != 'failure' && needs.build-bundle.result == 'success' &&
      github.repository == 'dxos/dxos' &&
      (inputs.environment == 'labs' || inputs.environment == 'staging' || inputs.environment == 'production')
    uses: ./.github/workflows/publish-tauri.yaml
    with:
      environment: ${{ inputs.environment }}
      ref: ${{ needs.release.outputs.sha || github.sha }}
    secrets: inherit
