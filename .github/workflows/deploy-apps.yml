name: Deploy Apps

# Deploys apps (Composer, docs, storybook, …) to Cloudflare Workers Static Assets, per environment. FULLY decoupled from
# npm publishing — never runs changeset publish. Apps + their environments are declared in
# deploy-manifest.json (generic; not Composer-specific).
#
# Environments & triggers. The app set for each env is derived from deploy-manifest.json's `environments`:
#   main       — automatic on every push to main; all main-enabled apps.
#   labs       — manual (workflow_dispatch); composer only.
#   staging    — manual (workflow_dispatch); composer + docs.
#   production — manual (workflow_dispatch); all apps. Also invoked per-app via workflow_call from the
#                release workflows (release-composer / release-app) for versioned releases.
#
# The manual dispatch takes only `environment` (default labs) — no app/ref inputs (pick the commit via the
# "Use workflow from" branch/tag selector). workflow_call keeps `app`/`ref` for the release workflows.
# "What's deployed where" is tracked by per-app floating git tags `<app>/<environment>` (pushed for the
# single-app workflow_call deploys the release workflows do). No GitHub Environments.

on:
  push:
    branches:
      - main
      # TEMP(remove before merge): exercise deploy-env.sh end-to-end on this release branch. A non-main
      # push resolves DEPLOY_ENV to `labs` (see below), so this deploys only labs-enabled apps and the
      # tauri job stays skipped (it keys off the empty `inputs.environment`). New workflows aren't
      # workflow_dispatch-able until they land on main, so a push trigger is the only pre-merge test path.
      - claude/hopeful-jennings-bd7969
  workflow_dispatch:
    inputs:
      environment:
        # The app set is derived from the environment (deploy-manifest.json): labs → composer,
        # staging → composer + docs, production → all. Choose the commit via the branch/tag selector.
        description: Target environment
        type: choice
        options: [labs, staging, production]
        default: labs
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      app:
        type: string
        default: all
      ref:
        type: string
        default: ''

concurrency:
  # One in-flight deploy per environment.
  group: deploy-${{ inputs.environment || 'main' }}
  cancel-in-progress: true

permissions:
  contents: write # Push the floating `env/<environment>` deploy pointer tag (labs/staging/production).

jobs:
  # Build Composer's web bundle ONCE and share it as an artifact so the web deploy + native (Tauri) jobs
  # don't each rebuild it. Runs only where a native build co-runs (labs/staging/production, or the labs
  # test-push) — `main` and static apps get no benefit and skip this. See docs/design/deploy-build-sharing.md.
  build-bundle:
    if: >-
      github.repository == 'dxos/dxos' &&
      ((inputs.app || 'all') == 'all' || (inputs.app || 'all') == 'composer') &&
      (inputs.environment == 'labs' || inputs.environment == 'staging' || inputs.environment == 'production'
       || (github.event_name == 'push' && github.ref_name != 'main'))
    runs-on: depot-ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 90
    env:
      DEPLOY_ENV: ${{ inputs.environment || (github.ref_name == 'main' && 'main' || 'labs') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ inputs.ref || github.sha }}

      - name: Set environment variables (Cloudflare creds, PostHog, …)
        run: .github/workflows/scripts/populate-env.sh "$DEPLOY_ENV" >> $GITHUB_ENV
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          COMPOSER_APP_PROD_POSTHOG_API_KEY: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_API_KEY }}
          COMPOSER_APP_PROD_POSTHOG_PROJECT_ID: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_PROJECT_ID }}
          COMPOSER_APP_PROD_POSTHOG_FEEDBACK_SURVEY_ID: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_FEEDBACK_SURVEY_ID }}
          COMPOSER_APP_TEST_POSTHOG_API_KEY: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_API_KEY }}
          COMPOSER_APP_TEST_POSTHOG_PROJECT_ID: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_PROJECT_ID }}
          COMPOSER_APP_TEST_POSTHOG_FEEDBACK_SURVEY_ID: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_FEEDBACK_SURVEY_ID }}
          DX_DISCORD_WEBHOOK_URL: ${{ secrets.DX_DISCORD_WEBHOOK_URL }}
          DX_POSTHOG_API_HOST: ${{ secrets.DX_POSTHOG_API_HOST }}
          IPDATA_API_KEY: ${{ secrets.IPDATA_API_KEY }}
          IPFS_API_SECRET: ${{ secrets.IPFS_API_SECRET }}

      - name: Setup
        uses: ./.github/actions/setup

      # Build only — the artifact is deployed by `deploy` and embedded by the tauri jobs.
      - name: Build Composer bundle
        run: .github/workflows/scripts/bundle-env.sh "$DEPLOY_ENV" composer
        env:
          NODE_ENV: production

      - name: Upload Composer bundle
        uses: actions/upload-artifact@v4
        with:
          name: composer-bundle
          path: packages/apps/composer-app/out/composer
          include-hidden-files: true
          retention-days: 1

  deploy:
    needs: [build-bundle]
    # Run when build-bundle succeeded (consume the artifact) OR was skipped (main / static-only — build
    # normally); skip only if build-bundle failed.
    if: ${{ !cancelled() && needs.build-bundle.result != 'failure' && github.repository == 'dxos/dxos' }}
    runs-on: depot-ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 90
    env:
      # Dispatch/call → the chosen env. Push → `main` deploys the rolling main env; any other pushed
      # branch → `labs` (the TEMP release-branch test trigger above; harmless once that branch is removed).
      DEPLOY_ENV: ${{ inputs.environment || (github.ref_name == 'main' && 'main' || 'labs') }}
      DEPLOY_APP: ${{ inputs.app || 'all' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ inputs.ref || github.sha }}

      # Select the env file by the DEPLOY environment (not the git branch) — environment is a deploy
      # parameter now, so a production deploy running from `main` must still read env/production.
      - name: Set environment variables (Cloudflare creds, PostHog, …)
        run: .github/workflows/scripts/populate-env.sh "$DEPLOY_ENV" >> $GITHUB_ENV
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          COMPOSER_APP_PROD_POSTHOG_API_KEY: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_API_KEY }}
          COMPOSER_APP_PROD_POSTHOG_PROJECT_ID: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_PROJECT_ID }}
          COMPOSER_APP_PROD_POSTHOG_FEEDBACK_SURVEY_ID: ${{ secrets.COMPOSER_APP_PROD_POSTHOG_FEEDBACK_SURVEY_ID }}
          COMPOSER_APP_TEST_POSTHOG_API_KEY: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_API_KEY }}
          COMPOSER_APP_TEST_POSTHOG_PROJECT_ID: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_PROJECT_ID }}
          COMPOSER_APP_TEST_POSTHOG_FEEDBACK_SURVEY_ID: ${{ secrets.COMPOSER_APP_TEST_POSTHOG_FEEDBACK_SURVEY_ID }}
          DX_DISCORD_WEBHOOK_URL: ${{ secrets.DX_DISCORD_WEBHOOK_URL }}
          DX_POSTHOG_API_HOST: ${{ secrets.DX_POSTHOG_API_HOST }}
          # Referenced by the env files (DX_IPDATA_API_KEY / IPFS_API_SECRET); populate-env.sh runs under
          # `set -u`, so these must be present or it aborts on an unbound variable.
          IPDATA_API_KEY: ${{ secrets.IPDATA_API_KEY }}
          IPFS_API_SECRET: ${{ secrets.IPFS_API_SECRET }}

      - name: Setup
        uses: ./.github/actions/setup

      # Consume the prebuilt Composer bundle when the prep job produced one (labs/staging/production) —
      # populating out/composer means bundle-env.sh reuses it instead of rebuilding.
      - name: Download Composer bundle
        if: needs.build-bundle.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: composer-bundle
          path: packages/apps/composer-app/out/composer

      # Build any app not already present (bundle-env.sh skips populated output dirs, e.g. the downloaded
      # composer bundle), then deploy them all.
      - name: Bundle apps
        run: .github/workflows/scripts/bundle-env.sh "$DEPLOY_ENV" "$DEPLOY_APP"
        env:
          NODE_ENV: production

      - name: Deploy apps
        run: .github/workflows/scripts/deploy-env.sh "$DEPLOY_ENV" "$DEPLOY_APP"
        env:
          NODE_ENV: production

      # Per-app floating pointer to the SHA currently deployed for this app+environment — the
      # branch-pointer replacement (e.g. `git diff composer/staging..composer/production`). `main` is the
      # branch tip (auto-deployed on every push) so no tag there; also skipped for the `all` fan-out.
      - name: Update deploy pointer tag
        if: env.DEPLOY_ENV != 'main' && env.DEPLOY_APP != 'all'
        run: |
          tag="${DEPLOY_APP}/${DEPLOY_ENV}"
          git tag -f "$tag" "${{ inputs.ref || github.sha }}"
          git push -f origin "refs/tags/$tag"

  # Desktop/mobile build runs in the same run as the Composer web deploy, for the named environments
  # (not `main` — a signed build per main push is too costly). CrabNebula channel is derived from the
  # environment inside the reusable workflow. iOS → App Store Connect happens on `labs` only (see it).
  tauri:
    # Wait for the shared bundle (build-bundle's `if` covers exactly these envs, so it always runs here).
    needs: [build-bundle]
    if: >-
      github.repository == 'dxos/dxos' &&
      ((inputs.app || 'all') == 'all' || (inputs.app || 'all') == 'composer') &&
      (inputs.environment == 'labs' || inputs.environment == 'staging' || inputs.environment == 'production')
    uses: ./.github/workflows/publish-tauri.yaml
    with:
      environment: ${{ inputs.environment }}
      ref: ${{ inputs.ref || '' }}
    secrets: inherit
