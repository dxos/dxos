name: Release Composer

# Cuts a PRODUCTION Composer release: bump the app version, record it on `main`, and deploy web + desktop
# + iOS. Composer is not in Changesets â€” its version lives here; there is no npm publish. labs/staging test
# deploys go through "Deploy Apps" (which prerelease-version + run Tauri). See docs/design/app-release-spec.md.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump for this production release.
        type: choice
        options: [patch, minor, major]
        default: patch
      ref:
        description: Git ref to release (must be on main; default the main tip).
        type: string
        default: ''

concurrency:
  group: release-composer
  cancel-in-progress: false

permissions:
  contents: write # Commit the version bump to main + push the version tag.

jobs:
  version:
    if: github.repository == 'dxos/dxos'
    runs-on: ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || 'main' }}

      - name: Setup
        uses: ./.github/actions/setup

      # composer-app + composer-crx share the desktop/extension version line; bump both in lockstep. Plain
      # semver bump (no Changesets) â€” a targeted version-line edit to keep the diff minimal.
      - name: Bump version
        id: bump
        run: |
          next=$(node -e '
            const fs = require("fs");
            const bump = process.argv[1];
            const cur = JSON.parse(fs.readFileSync("packages/apps/composer-app/package.json", "utf8")).version;
            const [maj, min, pat] = cur.split("-")[0].split(".").map(Number);
            const next = bump === "major" ? `${maj + 1}.0.0` : bump === "minor" ? `${maj}.${min + 1}.0` : `${maj}.${min}.${pat + 1}`;
            for (const p of ["composer-app", "composer-crx"]) {
              const f = "packages/apps/" + p + "/package.json";
              fs.writeFileSync(f, fs.readFileSync(f, "utf8").replace(/^(  "version": ")[^"]*(",)$/m, `$1${next}$2`));
            }
            process.stdout.write(next);
          ' "${{ inputs.bump }}")
          node scripts/sync-versions.mjs
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Composer -> $next"

      - name: Commit + tag on main
        id: commit
        run: |
          git config user.name 'dxos-bot'
          git config user.email 'bot@dxos.org'
          git add -A
          git commit -m "chore(composer): release v${{ steps.bump.outputs.version }}"
          git tag "composer-v${{ steps.bump.outputs.version }}"
          git push --follow-tags origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # Deploy the released commit to production: web (deploy-apps) + desktop/iOS (the reusable Tauri job it
  # invokes). deploy-apps moves the `composer/production` pointer tag.
  deploy:
    needs: version
    uses: ./.github/workflows/deploy-apps.yml
    with:
      environment: production
      app: composer
      ref: ${{ needs.version.outputs.sha }}
    secrets: inherit
