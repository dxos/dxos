name: Release (next)

# Publishes the @next pre-release channel as SNAPSHOT releases — manually triggered, with no Changesets
# `pre` mode, no `.changeset/pre.json`, and no long-lived branch. `changeset version --snapshot next`
# stamps ephemeral versions (e.g. 0.0.0-next-<datetime>) for packages with pending changesets (a fixed
# group versions together), then publishes them under the npm `next` dist-tag. Nothing is committed and
# no git tags are created — snapshots are throwaway.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to snapshot (default the triggering commit).
        type: string
        default: ''

concurrency:
  group: release-next
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm trusted-publisher OIDC + provenance.

jobs:
  release-next:
    if: github.repository == 'dxos/dxos'
    runs-on: ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Isolate publish cache from PR caches (cache-poisoning defense).
          cache-scope: publish
          verify-integrity: 'true'

      # Stamp ephemeral snapshot versions for packages with pending changesets, then mirror them into
      # version.ts / tauri.conf.json. No commit, no lockfile rewrite — the bump is throwaway.
      - name: Version (snapshot)
        run: |
          pnpm exec changeset version --snapshot next
          node scripts/sync-versions.mjs

      - name: Build
        run: moon run :build
        env:
          NODE_ENV: production

      # Shell must be bundled before npm publish.
      - name: Bundle Shell
        run: moon run shell:bundle
        env:
          NODE_ENV: production

      # Publish the snapshot versions under @next. --no-git-tag: snapshots are ephemeral and never tagged.
      - name: Publish @next (snapshot)
        run: pnpm exec changeset publish --tag next --no-git-tag
        env:
          NPM_CONFIG_PROVENANCE: 'true' # provenance via OIDC; trusted publisher means no NPM_TOKEN.
