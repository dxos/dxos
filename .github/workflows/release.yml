name: Release

# Maintains the Changesets "Version Packages" PR on every push to main; merging that PR publishes
# Group A (core/SDK) and Group B (plugins + cli) to npm @latest with provenance. The human gate is
# merging the PR — nobody runs changeset/publish locally. Apps deploy via deploy-apps.yml, never here.

on:
  push:
    branches:
      - main
  workflow_dispatch: {} # On-demand publish without waiting for the next push.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # Create the Version Packages PR + git tags.
  pull-requests: write # Maintain the Version Packages PR.
  id-token: write # npm trusted-publisher OIDC + provenance.

jobs:
  release:
    if: github.repository == 'dxos/dxos'
    # GitHub-hosted runner required for npm provenance (sigstore attestation).
    runs-on: ubuntu-24.04-4
    container:
      image: ghcr.io/dxos/gh-actions:24.11.1
      credentials:
        username: dxos-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # This repo does not use Changesets `pre` mode — the @next channel uses snapshot releases instead.
      # A stray `.changeset/pre.json` would silently turn a stable publish into a pre-release, so fail fast.
      - name: Guard against pre-release state on main
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "::error::.changeset/pre.json present — @next uses snapshot releases, not pre mode. Remove it (changeset pre exit)."
            exit 1
          fi

      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Isolate publish cache from PR caches (cache-poisoning defense).
          cache-scope: publish
          verify-integrity: 'true'

      - name: Build
        run: moon run :build
        env:
          NODE_ENV: production

      # Shell must be bundled before npm publish.
      - name: Bundle Shell
        run: moon run shell:bundle
        env:
          NODE_ENV: production

      # When changesets exist, maintains/updates the "Version Packages" PR. When that PR is merged
      # (versions bumped, no changesets remain), runs the publish command instead.
      - name: Version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true' # provenance via OIDC; trusted publisher means no NPM_TOKEN.

  # NOTE: no app deploy here. Apps deploy on their own cadence via deploy-apps.yml + the release-composer /
  # release-app workflows, fully decoupled from npm publishing. See docs/design/app-release-spec.md.
