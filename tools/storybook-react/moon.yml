layer: tool
language: typescript
tasks:
  #
  # Test locally via: npx http-server ./out/storybook-react
  #
  bundle:
    command: storybook build
    args:
      - --output-dir=out/storybook-react
    deps:
      # Ensure that all packages are built to run storybook.
      - '#ts-build:build'
      - '#ts-compile:build'
      # Vendor bundles (e.g. `@dxos/vendor-hyperformula`) use the `vendor` tag, not `ts-build`/
      # `ts-compile`, so they are not covered above; without their dist Vite's dep-scan aborts.
      - '#vendor:build'
      # See `serve` — plugin-sketch static assets must exist before storybook builds.
      - plugin-sketch:prebuild
    inputs:
      - .storybook/*
      - /tools/storybook-react/.storybook/main.ts
      - static/*
      - $NODE_OPTIONS
    outputs:
      - out/storybook-react/
  serve:
    command: storybook dev
    args:
      - --port=9009
      - --no-open
    deps:
      # Build the full package closure the stories need, mirroring `bundle`. `^:build` alone only
      # covers storybook-react's own project deps, so on a fresh worktree it omits artifacts that
      # stories import transitively — e.g. `@dxos/vendor-hyperformula`'s bundle (Vite's dep-scan then
      # aborts and no story loads).
      - '#ts-build:build'
      - '#ts-compile:build'
      # Vendor bundles (e.g. `@dxos/vendor-hyperformula`) use the `vendor` tag, not `ts-build`/
      # `ts-compile`; their dist is what the dep-scan above needs.
      - '#vendor:build'
      # `.storybook/main.ts` serves `plugin-sketch/dist/assets` as a staticDir; storybook aborts if it
      # is missing. It hangs off plugin-sketch's `build`, which the tag deps above do not run, so a
      # fresh worktree has no assets. Generate them explicitly.
      - plugin-sketch:prebuild
    inputs:
      - .storybook/*
      - /tools/storybook-react/.storybook/main.ts
      - static/*
    preset: server
  # Fast dev variant: DX_FASTBUNDLE skips the `importSource` source-resolution plugin and
  # pre-bundles heavy deps, shrinking the live module graph so long sessions are less likely
  # to wedge the browser renderer. Trades granular HMR on DXOS source for lower memory/churn.
  serve-fast:
    command: storybook dev
    args:
      - --port=9009
      - --no-open
    env:
      DX_FASTBUNDLE: '1'
    deps:
      # See `serve` — build the full closure so a fresh worktree has every artifact stories import.
      - '#ts-build:build'
      - '#ts-compile:build'
      - '#vendor:build'
      - plugin-sketch:prebuild
    inputs:
      - .storybook/*
      - /tools/storybook-react/.storybook/main.ts
      - static/*
    preset: server
  # TODO(wittjosiah): No inputs or deps to avoid moon re-building things when running e2e tests.
  serve-e2e:
    command: storybook dev
    args:
      - --port=9009
      - --ci
      - --quiet
      - --config-dir=config/e2e
    preset: server
