$schema: https://moonrepo.dev/schemas/tasks.json
# New library build pipeline: vite + rolldown for JS, tsgo for .d.ts (run via DxTsgoPlugin in closeBundle).
# Packages migrate from `ts-build` to `ts-vite-build` once they have a `vite.config.ts` and updated exports.
tasks:
  build:
    command: pnpm exec vite build
    deps:
      - dx-build:compile
      # vite.base.config.ts now houses vitest project builders too — those import
      # `@dxos/esbuild-plugins`, `@dxos/vite-plugin-import-source`, and the
      # `vite-plugin-log` plugin source at config-load time. On a clean CI run those
      # workspace tools must be built before any vite build that imports the base
      # config can resolve them.
      - esbuild-plugins:compile
      - vite-plugin-import-source:compile
      - vite-plugin-log:compile
      - ^:build
      - ^:compile
    inputs:
      - /tsconfig.base.json
      - /vite.base.config.ts
      - /vitest.base.config.ts
      - /tools/vite-plugin-log/src/**/*
      - tsconfig.json
      - vite.config.ts
      - '@group(sources)'
    outputs:
      - dist/lib/
      - dist/types/
    options:
      timeout: 120
  # Alias for backwards compatibility: many other moon projects declare
  # dependencies like `foo:compile`. Now that the new build emits both
  # `dist/lib/` and `dist/types/` in a single pass, `compile` is just `build`.
  compile:
    deps:
      - build

inheritedBy:
  tags: ts-vite-build
