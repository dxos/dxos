$schema: https://moonrepo.dev/schemas/tasks.json
tasks:
  e2e:
    command: pnpm exec playwright test
    args:
      - --config=src/playwright/playwright.config.ts
    deps:
      - test-utils:compile
      - vite-plugin-icons:compile
      - target: ^:build
        optional: true
      - target: ^:compile
        optional: true
      - target: bundle
        optional: true
        env:
          DX_EDGE_BASE_URL: 'wss://edge-main.dxos.workers.dev/'
          DX_EDGE_CLIENT_TAG: e2e
    inputs:
      - src/playwright/playwright.config.ts
      - '@group(sources)'
      - '@group(tests)'
      - $CI
      - $CONFIG_DYNAMIC
      - $DX_ENVIRONMENT
      - $DX_HOST
      - $DX_HUB_URL
      - $DX_IPDATA_API_KEY
      - $DX_SHARED_WORKER
      - $PLAYWRIGHT_BROWSER

inheritedBy:
  tags: e2e
