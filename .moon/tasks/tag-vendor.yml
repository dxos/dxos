# For vendored deps.
# I.e. external deps that we pre-build in our monorepo to eliminate tooling inconsistencies.

$schema: https://moonrepo.dev/schemas/tasks.json
tasks:
  build:
    command: pnpm exec dx-compile
    args:
      - --outputPath=dist/lib
    deps:
      - dx-compile:build
      - ^:build
    inputs:
      - '@group(production)'
    outputs:
      - dist/lib/
    options:
      timeout: 10

inheritedBy:
  tags: vendor
