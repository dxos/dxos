$schema: https://moonrepo.dev/schemas/tasks.json
tasks:
  tauri-build:
    command: bunx tauri build
    options:
      # TODO(wittjosiah): Determine which the outputs are which should be cached.
      cache: false
  tauri-dev:
    command: bunx tauri dev
    deps:
      - ^:compile
    preset: server
  # https://tauri.app/develop/#developing-your-mobile-application
  tauri-ios:
    command: bunx tauri ios dev
    deps:
      - ^:compile
    preset: server
  tauri-ios-build:
    command: bunx tauri ios build
    # TODO(wittjosiah): Determine which the outputs are which should be cached.
    options:
      cache: false

inheritedBy:
  tags: tauri
