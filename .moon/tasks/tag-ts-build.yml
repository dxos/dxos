$schema: https://moonrepo.dev/schemas/tasks.json
tasks:
  build:
    command: pnpm exec dx-build
    deps:
      - dx-build:compile
      - ^:build
      - ^:compile
      - compile
    inputs:
      - /tsconfig.base.json
      - tsconfig.json
      - '@group(sources)'
    outputs:
      - dist/types/
    options:
      timeout: 60
  compile:
    command: pnpm exec tsdown
    deps:
      - ^:compile
    inputs:
      - /tsdown.base.config.ts
      - /tools/vite-plugin-log/src/**/*
      - tsconfig.json
      - tsdown.config.ts
      - '@group(sources)'
    outputs:
      - dist/lib/
    options:
      timeout: 60

inheritedBy:
  tags: ts-build
